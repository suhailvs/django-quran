<!DOCTYPE html>
  <html>
    <head>      
      <title>{% block head_title %}{% endblock %} HolyQuran</title>
      {% load staticfiles %}
      <link rel="stylesheet" href="{% static "css/djangodocs.css" %}" type="text/css" />
      <link href="{% static "css/style.css" %}" rel="stylesheet">     
      {% block extra_head %}
      {% endblock %}
    </head>

    <body>
      <div class="document">
  <div id="custom-doc">
    <div id="hd">
      <h1><a href="#">HolyQuran</a></h1>
      <div id="global-nav">
        <a title="Home page" href="{% url 'quran_index' %}">Home</a>  |
        <a href="{% url 'quran_root_list' %}">Roots</a> |
        <a title="Global index" href="genindex.html">Index</a> 
      </div>
      <div class="nav">
        &laquo; <a href="contents.html" title="Django documentation contents">previous</a> |
        <a title="Django 1.8 documentation" href="#" accesskey="U">up</a>|
        <a href="intro/index.html" title="Getting started">next</a> &raquo;
        {% block nav_bar %}{% endblock %} 
      </div>
    </div>

    <div id="bd">
      <div id="yui-main">
        <div class="yui-b">
          <div class="yui-g" id="index">            
            <div class="section">
              {% block body %}
              {% endblock %}  
            </div>
          </div>
        </div>
      </div>
    </div>      
  </div>

      <div class="clearer"></div>
    </div>

      <!--Import jQuery before materialize.js-->
      <script type="text/javascript" src="{% static "jquery.js" %}"></script>      
      {% block javascript %}
      {% endblock %}    
    </body>
  </html>
