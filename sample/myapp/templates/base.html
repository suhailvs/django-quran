<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block head_title %}{% endblock %} HolyQuran</title>
  {% load staticfiles %}
  {% load extra_filters %}
  <link rel="stylesheet" href="{% static "960.css" %}" type="text/css" />
  <link href="{% static "style.css" %}" rel="stylesheet">     
  {% block extra_head %}{% endblock %}    
</head>
<body>
<div class="container_12">
  <h2 style="color:#fff">HolyQuran v1</h2>  
  <div class="grid_8" style="background:#fff">
    <div style="padding:20px">{% block body %}{% endblock %}</div>
  </div>
  <div class="grid_4" style="background:#234F32">
    <div id="sidebar"> 
      <h3>Translations</h3>
      {{ cur_trans|trans_list }}    

      <h3>Quick search</h3>
      <form class="search" action="/" method="get">
        <input type="text" name="q">
        <input type="hidden" name="trans" value="{{cur_trans}}">
        <input type="submit" value="Go">
      </form>
      
      <h3>Chapters</h3>      
      {{ sura.pk|suras_list }}     
    </div>
  </div>
</div><!-- end .container_12 -->
<script type="text/javascript" src="{% static "jquery.js" %}"></script>      
{% block javascript %}{% endblock %}    
</body>
</html>
