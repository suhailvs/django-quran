{% extends "base.html" %}
{% block body %}
<div class="container">	
	<div class="row">	
	  <div class="col-md-8 col-md-offset-2">
	    {{ root }}
		<hr>
		<ul>
		    {% for lemma in lemmas %}
		    <li>
		        <a href="{{ lemma.get_absolute_url }}">{{ lemma.token }}</a>
		        {% for aya in lemma.ayas.distinct %}
		        <div>{{ aya.sura_id }}:{{ aya.number }}. <span class="aya">{{ aya.text }}</span></div>
		        {% endfor %}
		    </li>
		    {% endfor %}
		</ul>
	  </div>
	</div>
</div>
{% endblock %}
